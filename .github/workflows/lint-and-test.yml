name: Lint and test

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint-and-test:
    runs-on: ubuntu-24.04
    timeout-minutes: 15
    steps:
      - name: 🏃‍♂️‍➡️ Checkout project
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: 👩‍🔧 Install pnpm
        uses: pnpm/action-setup@26f6d4f2c533a43e6b5da0b4a5dd983f98f7b49a # v6.0.4
        with:
          version: 10

      - name: 👨‍🔧 Install Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          node-version: 20
          cache: 'pnpm'

      - name: 🏋️ Install dependencies
        run: pnpm install --frozen-lockfile

      - name: 🏗️ Build project
        run: pnpm -r build

      - name: 🧭 Run lint check
        run: pnpm check

      - name: 🧨 Run test
        run: |
          pnpm test > test-output.log 2>&1 || TEST_FAILED=1
          echo "Total: $(wc -l < test-output.log) lines"
          echo "---"
          grep -E 'FAIL|ERROR' test-output.log || echo "(no fails found)"
          echo "---"
          tail -n 50 test-output.log
          [ -z "$TEST_FAILED" ] || exit 1

      - name: 📁 Upload test logs
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        if: always()
        with:
          path: test-output.log
