name: Lint and test

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint-and-test:
    runs-on: ubuntu-24.04
    timeout-minutes: 15
    steps:
      - name: 🏃‍♂️‍➡️ Checkout project
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: 👩‍🔧 Install pnpm
        uses: pnpm/action-setup@fc06bc1257f339d1d5d8b3a19a8cae5388b55320 # v4
        with:
          version: 10

      - name: 👨‍🔧 Install Node.js
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: 20
          cache: 'pnpm'

      - name: 🏋️ Install dependencies
        run: pnpm install --frozen-lockfile

      - name: 🏗️ Build project
        run: pnpm -r build

      - name: 🧭 Run lint check
        run: pnpm check

      - name: 🧨 Run test
        run: |
          pnpm test > test-output.log 2>&1 || TEST_FAILED=1
          echo "Total: $(wc -l < test-output.log) lines"
          echo "---"
          grep -E 'FAIL|ERROR' test-output.log || echo "(no fails found)"
          echo "---"
          tail -n 50 test-output.log
          [ -z "$TEST_FAILED" ] || exit 1

      - name: 📁 Upload test logs
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        if: always()
        with:
          path: test-output.log
