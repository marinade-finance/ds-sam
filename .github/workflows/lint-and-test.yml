name: Lint and test

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint-and-test:
    runs-on: ubuntu-24.04
    timeout-minutes: 15
    steps:
      - name: 🏃‍♂️‍➡️ Checkout project
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: 👩‍🔧 Install pnpm
        uses: pnpm/action-setup@fc06bc1257f339d1d5d8b3a19a8cae5388b55320 # v5
        with:
          version: 10

      - name: 👨‍🔧 Install Node.js
        uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # v6
        with:
          node-version: 20
          cache: 'pnpm'

      - name: 🏋️ Install dependencies
        run: pnpm install --frozen-lockfile

      - name: 🏗️ Build project
        run: pnpm -r build

      - name: 🧭 Run lint check
        run: pnpm check

      - name: 🧨 Run test
        run: |
          pnpm test > test-output.log 2>&1 || TEST_FAILED=1
          echo "Total: $(wc -l < test-output.log) lines"
          echo "---"
          grep -E 'FAIL|ERROR' test-output.log || echo "(no fails found)"
          echo "---"
          tail -n 50 test-output.log
          [ -z "$TEST_FAILED" ] || exit 1

      - name: 📁 Upload test logs
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7
        if: always()
        with:
          path: test-output.log
