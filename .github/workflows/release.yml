name: Release
# Creates GitHub Release on tag push (e.g., v1.0.0) or manual trigger (attaches built packages as artifacts)
# This workflow does **NOT** publish to npm registry. For npm release: run `pnpm publish` locally at packages/ds-sam-sdk

on:
  push:
    tags:
      - 'v*.*.*'
  workflow_dispatch:
    inputs:
      version:
        description: "Release version in format 'v1.0.0'"
        required: true
        type: string

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-24.04
    steps:
      - name: 🏃‍♂️‍➡️ Checkout project
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: 👩‍🔧 Install pnpm
        uses: pnpm/action-setup@26f6d4f2c533a43e6b5da0b4a5dd983f98f7b49a # v6.0.4
        with:
          version: 10

      - name: 👨‍🔧 Install Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          node-version: 20
          cache: 'pnpm'

      - name: 🏋️ Install and 🔨 build
        run: |
          pnpm install --frozen-lockfile
          pnpm -r build
          pnpm -r pack

      - name: 🔮 Determine tag
        id: tag
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "tag=${{ inputs.version }}" >> $GITHUB_OUTPUT
          else
            echo "tag=${{ github.ref_name }}" >> $GITHUB_OUTPUT
          fi

      - name: 🎉 Create Release
        uses: ncipollo/release-action@339a81892b84b4eeb0f6e744e4574d79d0d9b8dd # v1
        with:
          artifacts: '*.tgz'
          generateReleaseNotes: true
          tag: ${{ steps.tag.outputs.tag }}
          token: ${{ secrets.GITHUB_TOKEN }}
